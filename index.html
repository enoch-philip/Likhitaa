<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<!-- ================= HOME PAGE ================= -->

<div id="home" class="page active">

    <div class="cake">🎂</div>

    <h1>Happy Birthday ❤️</h1>

    <p>May your day be filled with love, laughter and unforgettable memories.</p>

    <div class="buttons">
        <button onclick="showPage('memories')">✨ Memories</button>
        <button onclick="showPage('letter')">💌 Letter For You</button>
    </div>

</div>

<!-- ================= MEMORIES PAGE ================= -->

<div id="memories" class="page">

    <h2>Our Beautiful Memories ❤️</h2>

    <div class="gallery">

        <!-- Top Row -->
<video controls src="video1.mp4"></video>
<video controls src="video2.mp4"></video>
<video controls src="video3.mp4"></video>

        <img src="photo1.jpg" class="center-photo" onclick="openMedia(this.src)">
<video controls src="video4.mp4"></video>
<video controls src="video5.mp4"></video>
<video controls src="video6.mp4"></video>

    </div>

    <button onclick="showPage('home')">
        ⬅ Back
    </button>

</div>

<!-- ================= LETTER PAGE ================= -->

<div id="letter" class="page">

    <div class="envelope" onclick="openLetter()">
        💌
    </div>

    <div id="letterCard">

        <h2>My Dear ❤️</h2>

        <p id="typed"></p>

    </div>

    <button onclick="showPage('home')">
        ⬅ Back
    </button>

</div>

<!-- ================= IMAGE VIEWER ================= -->

<div id="viewer" onclick="closeMedia()">

    <img id="bigImg">

</div>

<script src="script.js"></script>

</body>
</html>
