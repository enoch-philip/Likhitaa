<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>
<div id="home" class="page active">
  <div class="cake">🎂</div>
  <h1>Happy Birthday ❤️</h1>
  <p>May your day be filled with love and smiles.</p>
  <div class="buttons">
    <button onclick="showPage('memories')">✨ Memories</button>
    <button onclick="showPage('letter')">💌 Letter For You</button>
  </div>
</div>

<div id="memories" class="page">
<h2>Our Memories</h2>
<div class="gallery">
<img src="images/photo1.jpg" onclick="openMedia(this.src)">
<img src="images/photo2.jpg" onclick="openMedia(this.src)">
<img src="images/photo3.jpg" onclick="openMedia(this.src)">
<video controls src="videos/video1.mp4"></video>
<video controls src="videos/video2.mp4"></video>
</div>
<button onclick="showPage('home')">⬅ Back</button>
</div>

<div id="letter" class="page">
<div class="envelope" onclick="openLetter()">💌</div>
<div id="letterCard">
<h2>My Dear ❤️</h2>
<p id="typed">
Replace this paragraph with your personal birthday letter. The typing animation will reveal it beautifully.
</p>
</div>
<button onclick="showPage('home')">⬅ Back</button>
</div>

<div id="viewer" onclick="closeMedia()"><img id="bigImg"></div>

<script src="script.js"></script>
</body>
</html>
